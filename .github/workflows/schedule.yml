name: Daily Crypto Intelligence Update

on:
  schedule:
    - cron: '0 5,11,23 * * *' # Runs at 05:00, 11:00, and 23:00 UTC (12:00, 18:00, 06:00 Bangkok)
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  run-analyst:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Market Analyst
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_LINE_ACCESS_TOKEN: ${{ secrets.NEWS_LINE_ACCESS_TOKEN }}
          NEWS_LINE_USER_ID: ${{ secrets.NEWS_LINE_USER_ID }}        run: python bot.py
